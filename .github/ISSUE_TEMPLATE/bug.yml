name: Bug report
description: Report a reproducible problem without exposing private writing or keys.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Writing Workshop. Remove API keys and private manuscript text before submitting.
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Give the smallest sequence that reproduces the problem.
      placeholder: "1. Start with...\n2. Open...\n3. Run..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: OS and browser
      placeholder: Windows 11 / Chrome 130
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Privacy check
      options:
        - label: I removed API keys and private manuscript content.
          required: true
