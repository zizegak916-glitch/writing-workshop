<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>AI 写作工坊</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--p:#4f46e5;--bg:#f9fafb;--sf:#fff;--bd:#e5e7eb;--t1:#1f2937;--t2:#6b7280;--t3:#9ca3af;--ok:#22c55e;--err:#ef4444;--accent:#7c3aed}
body.dark{--bg:#0f172a;--sf:#1e293b;--bd:#334155;--t1:#e2e8f0;--t2:#94a3b8;--t3:#64748b}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--t1);margin:0;font-family:-apple-system,system-ui,sans-serif;transition:background .3s}
.hdr{background:var(--sf);border-bottom:1px solid var(--bd);height:48px;display:flex;align-items:center;padding:0 12px;position:fixed;top:0;left:0;right:0;z-index:50}
.btabs{position:fixed;bottom:0;left:0;right:0;background:var(--sf);border-top:1px solid var(--bd);display:flex;z-index:50;height:52px}
.abody{position:fixed;top:48px;bottom:52px;left:0;right:0;overflow:hidden}
.tpn{position:absolute;inset:0;overflow-y:auto;background:var(--bg);display:none}.tpn.on{display:block}
.hbtn{height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;border:none;cursor:pointer;padding:0 12px;gap:4px;transition:transform .1s}
.hbtn:active{transform:scale(.95)}
.hbtn-p{background:var(--p);color:#fff}.hbtn-d{background:#374151;color:#fff}.hbtn-g{background:transparent;color:var(--t2)}.hbtn-ok{background:#059669;color:#fff}
body.dark .hbtn-d{background:#4b5563}
.btab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;color:var(--t3);cursor:pointer;border:none;background:none;padding:4px 0}
.btab.on{color:var(--p)}.btab i{font-size:18px;margin-bottom:2px}
.etool{background:var(--sf);border-bottom:1px solid var(--bd);padding:8px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ebox{flex:1;border:none;padding:16px;font-size:15px;line-height:1.8;resize:none;background:var(--bg);color:var(--t1);outline:none;font-family:serif;transition:font-size .2s,line-height .2s}
.litem{padding:12px 16px;border-bottom:1px solid var(--bd);background:var(--sf);cursor:pointer;display:flex;align-items:center;transition:background .15s}
.litem:active{background:rgba(79,70,229,.08)}.litem.sel{border-left:3px solid var(--p);background:rgba(79,70,229,.05)}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:12px;margin:8px 16px;padding:12px}
.ambtn{padding:6px 8px;border-radius:6px;font-size:12px;color:var(--t2);background:var(--sf);border:1px solid var(--bd);cursor:pointer;text-align:center}
.ambtn.on{background:var(--p);color:#fff;border-color:var(--p)}.ambtn:active{transform:scale(.95)}
.minp{width:100%;border:1px solid var(--bd);border-radius:8px;padding:10px 12px;font-size:14px;background:var(--sf);color:var(--t1);margin-bottom:8px}
.minp:focus{outline:none;border-color:var(--p)}
.airesp{font-size:14px;color:var(--t2);line-height:1.7;white-space:pre-wrap}.airesp strong{color:var(--t1)}.airesp code{background:#f3f4f6;padding:1px 4px;border-radius:3px;font-size:13px}
body.dark .airesp code{background:#334155}
body.dark input,body.dark select,body.dark textarea{background:#1e293b;color:#e2e8f0;border-color:#334155}
body.dark .litem{border-color:#334155}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.mcard{background:var(--sf);border-radius:16px;padding:20px;padding-top:48px;width:94vw;max-width:520px;max-height:85vh;overflow-y:auto;position:relative}
.mcls{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;background:var(--bd);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);font-size:16px}
.wcard{background:linear-gradient(135deg,#eef2ff,#faf5ff);border:1px solid #e0e7ff;border-radius:16px;padding:32px 24px;margin:24px 16px;text-align:center}
body.dark .wcard{background:linear-gradient(135deg,#1e1b4b,#1e293b);border-color:#312e81}
.cta{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;padding:10px 24px;border-radius:10px;font-weight:600;font-size:14px;border:none;cursor:pointer}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#eef2ff,#faf5ff);padding:24px}
body.dark .login-wrap{background:linear-gradient(135deg,#0b1120,#111827)}
.login-card{background:var(--sf);border:1px solid var(--bd);border-radius:20px;padding:28px;width:100%;max-width:420px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
.assist-bar{display:flex;flex-wrap:wrap;gap:6px;padding:10px 12px;border-top:1px solid var(--bd);background:var(--sf)}
.assist-resp{border-top:1px solid var(--bd);background:var(--bg);padding:10px 12px;max-height:40vh;overflow-y:auto}
.quick-btn{padding:6px 10px;border-radius:8px;font-size:12px;border:1px solid var(--bd);background:var(--sf);color:var(--t1);cursor:pointer}
.quick-btn:active{transform:scale(.97)}.quick-btn.on{background:var(--p);color:#fff;border-color:var(--p)}
.compare-grid{display:grid;grid-template-columns:1fr;gap:10px;padding:12px}
@media(min-width:900px){.compare-grid{grid-template-columns:1fr 1fr 1fr}}
.compare-card{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:12px;min-height:120px}
.slot-card{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:12px;margin:8px 16px}
.slot-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.slot-toggle{position:relative;width:44px;height:24px;border-radius:12px;background:#cbd5e1;border:none;cursor:pointer}
.slot-toggle.on{background:var(--p)}
.slot-toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s}
.slot-toggle.on::after{transform:translateX(20px)}
#toast{position:fixed;top:60px;right:16px;padding:10px 16px;border-radius:8px;z-index:200;font-size:14px}

/* Focus mode */
body.focus-mode .hdr,body.focus-mode .btabs,body.focus-mode #ctxBar,body.focus-mode .etool{display:none!important}
body.focus-mode .abody{top:0;bottom:0}
body.focus-mode .tpn.on{padding:0}
body.focus-mode #earea{height:100%!important}
body.focus-mode #editor{padding:40px 20vw;font-size:17px;line-height:2}
body.focus-mode .assist-bar{display:none!important}
body.focus-mode .assist-resp{display:none!important}
#focusExit{position:fixed;top:16px;right:16px;z-index:60;display:none}
body.focus-mode #focusExit{display:block}

/* Stats bar */
.stats-bar{display:flex;gap:12px;padding:8px 16px;background:var(--sf);border-bottom:1px solid var(--bd);font-size:12px;color:var(--t2)}
.stat-item{display:flex;align-items:center;gap:4px}
.stat-val{font-weight:700;color:var(--p)}

/* Goal progress */
.goal-bar{height:6px;border-radius:3px;background:var(--bd);overflow:hidden;margin-top:4px}
.goal-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--p),var(--accent));transition:width .5s}

/* History item */
.hist-item{padding:8px 12px;border-bottom:1px solid var(--bd);font-size:13px;cursor:pointer}
.hist-item:hover{background:rgba(79,70,229,.05)}
.hist-label{font-weight:600;color:var(--p);font-size:11px}
.hist-preview{color:var(--t2);font-size:12px;max-height:40px;overflow:hidden;margin-top:2px}

/* Markdown preview */
.md-preview{padding:16px;font-size:15px;line-height:1.8;font-family:serif}
.md-preview h1,.md-preview h2,.md-preview h3{font-weight:700;margin:16px 0 8px}
.md-preview h1{font-size:24px}.md-preview h2{font-size:20px}.md-preview h3{font-size:17px}
.md-preview p{margin:8px 0}
.md-preview blockquote{border-left:3px solid var(--p);padding-left:12px;color:var(--t2);margin:8px 0}
.md-preview code{background:#f3f4f6;padding:2px 6px;border-radius:4px;font-size:13px}
body.dark .md-preview code{background:#334155}
.md-preview hr{border:none;border-top:1px solid var(--bd);margin:16px 0}

/* Recycle */
.recycle-item{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--bd);font-size:13px}

@keyframes spin{to{transform:rotate(360deg)}}.fa-spin{animation:spin 1s linear infinite}
@keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}
</style>
</head>
