<script>
/* ===== IndexedDB ===== */
const DB_NAME='WritingWS',DB_VER=1;let db;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,DB_VER);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('projects'))d.createObjectStore('projects',{keyPath:'id',autoIncrement:true});if(!d.objectStoreNames.contains('outlines'))d.createObjectStore('outlines',{keyPath:'id',autoIncrement:true});if(!d.objectStoreNames.contains('characters'))d.createObjectStore('characters',{keyPath:'id',autoIncrement:true});if(!d.objectStoreNames.contains('chapters'))d.createObjectStore('chapters',{keyPath:'id',autoIncrement:true});if(!d.objectStoreNames.contains('aiHistory'))d.createObjectStore('aiHistory',{keyPath:'id',autoIncrement:true});};r.onsuccess=e=>{db=e.target.result;res(db);};r.onerror=e=>rej(e.target.error);});}
function dbPut(store,val){return new Promise((res,rej)=>{const tx=db.transaction(store,'readwrite');const s=tx.objectStore(store);const r=s.put(val);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
function dbGet(store,id){return new Promise((res,rej)=>{const tx=db.transaction(store,'readonly');const r=tx.objectStore(store).get(id);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
function dbDel(store,id){return new Promise((res,rej)=>{const tx=db.transaction(store,'readwrite');const r=tx.objectStore(store).delete(id);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});}
function dbAll(store){return new Promise((res,rej)=>{const tx=db.transaction(store,'readonly');const r=tx.objectStore(store).getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
function dbByIndex(store,field,val){return new Promise((res,rej)=>{const tx=db.transaction(store,'readonly');const s=tx.objectStore(store);const all=[];const r=s.openCursor();r.onsuccess=e=>{const c=e.target.result;if(c){if(c.value[field]===val)all.push(c.value);c.continue();}else res(all);};r.onerror=()=>rej(r.error);});}

/* ===== State ===== */
let proj=null,active=null,editCharId=null,modes={},lastResp='',selMode='write',assistLast='',aiView='single';

/* ===== Login ===== */
async function sha256(text){const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(text));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');}
function initLogin(){
  const h=localStorage.getItem('pwd_hash');
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('appRoot').style.display='none';
  if(h){document.getElementById('loginSet').style.display='none';document.getElementById('loginCheck').style.display='block';document.getElementById('loginSub').textContent='输入密码解锁';}
  else{document.getElementById('loginSet').style.display='block';document.getElementById('loginCheck').style.display='none';document.getElementById('loginSub').textContent='首次使用请设置密码';}
}
async function registerPwd(){
  const p1=document.getElementById('setPwd1').value,p2=document.getElementById('setPwd2').value;
  const err=document.getElementById('loginErr');
  if(p1.length<4){err.textContent='密码至少4位';err.style.display='block';return;}
  if(p1!==p2){err.textContent='两次密码不一致';err.style.display='block';return;}
  const h=await sha256(p1);localStorage.setItem('pwd_hash',h);unlockApp();
}
async function loginPwd(){
  const p=document.getElementById('chkPwd').value;const err=document.getElementById('loginErr');
  const h=await sha256(p);
  if(h===localStorage.getItem('pwd_hash')){unlockApp();}
  else{err.textContent='密码错误';err.style.display='block';}
}
function unlockApp(){document.getElementById('loginScreen').style.display='none';document.getElementById('appRoot').style.display='block';bootApp();}
function logoutPwd(){localStorage.removeItem('pwd_hash');location.reload();}

/* ===== Unified API ===== */
var PRESETS={xiaomi:{b:'https://api.xiaomimimo.com/v1',m:'mimo-v2.5-pro',t:'openai'},claude:{b:'https://api.anthropic.com/v1',m:'claude-sonnet-4-20250514',t:'claude'},openrouter:{b:'https://openrouter.ai/api/v1',m:'anthropic/claude-sonnet-4',t:'openai'},openai:{b:'https://api.openai.com/v1',m:'gpt-4o',t:'openai'},deepseek:{b:'https://api.deepseek.com/v1',m:'deepseek-chat',t:'openai'},zhipu:{b:'https://open.bigmodel.cn/api/paas/v4',m:'glm-4-flash',t:'openai'},qwen:{b:'https://dashscope.aliyuncs.com/compatible-mode/v1',m:'qwen-plus',t:'openai'},moonshot:{b:'https://api.moonshot.cn/v1',m:'moonshot-v1-8k',t:'openai'},siliconflow:{b:'https://api.siliconflow.cn/v1',m:'deepseek-ai/DeepSeek-V3',t:'openai'}};

function getApi(){return{base_url:localStorage.getItem('api_base')||'',api_key:localStorage.getItem('api_key')||'',model:localStorage.getItem('api_model')||'',type:localStorage.getItem('api_type')||'openai'};}

async function callAPIWith(cfg,messages,opts={}){
  if(cfg.type==='claude'){
    const system=messages.find(m=>m.role==='system')?.content||'';
    const msgs=messages.filter(m=>m.role!=='system');
    const body={model:cfg.model,max_tokens:opts.max_tokens||4096,messages:msgs,...(system?{system}:{})};
    if(opts.temperature!=null)body.temperature=opts.temperature;
    const resp=await fetch(cfg.base_url+'/messages',{method:'POST',headers:{'x-api-key':cfg.api_key,'anthropic-version':'2023-06-01','content-type':'application/json'},body:JSON.stringify(body)});
    const d=await resp.json();if(d.error)throw new Error(d.error.message||JSON.stringify(d.error));return d.content[0].text;
  }else{
    const body={model:cfg.model,messages:messages,max_tokens:opts.max_tokens||4096};
    if(opts.temperature!=null)body.temperature=opts.temperature;
    const resp=await fetch(cfg.base_url+'/chat/completions',{method:'POST',headers:{'Authorization':'Bearer '+cfg.api_key,'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await resp.json();if(d.error)throw new Error(d.error.message||JSON.stringify(d.error));return d.choices[0].message.content;
  }
}
async function callAPI(messages,opts={}){return callAPIWith(getApi(),messages,opts);}

/* ===== Modes ===== */
async function loadModes(){
  modes={continue:{name:'续写',sys:'请续写以下内容，保持风格一致，自然衔接。'},polish:{name:'润色',sys:'请润色以下文字，保持原意，提升文学性。返回润色后的全文。'},expand:{name:'扩写',sys:'请扩写以下内容，增加环境、心理、感官细节描写。'},condense:{name:'缩写',sys:'请精简压缩以下内容，保留核心情节和关键对话。'},dialogue:{name:'生成对话',sys:'请为以下场景生成生动自然的人物对话，符合人物性格。'},describe_scene:{name:'场景描写',sys:'请生成沉浸式场景描写，运用多感官描写营造氛围。'},describe_character:{name:'人物描写',sys:'请生成生动的人物外貌和性格描写，通过细节展现特质。'},plot_twist:{name:'情节转折',sys:'请设计出人意料又合理的情节转折，包含铺垫建议。'},conflict:{name:'冲突设计',sys:'请设计有张力、悬念和情感冲击力的冲突场景。'},worldbuild:{name:'世界观设定',sys:'请生成详细的世界观设定，包括地理、历史、魔法/科技体系、社会制度。'},analyze_plot:{name:'情节分析',sys:'请分析以下故事的情节结构，指出主线支线、节奏、伏笔、改进建议。'},feedback:{name:'写作反馈',sys:'请以专业编辑角度给出建设性反馈，从结构、文笔、人物、情节等方面点评。'},style_mimic:{name:'风格模仿',sys:'请模仿用户指定的写作风格来改写或续写内容。'},translate_style:{name:'文风转换',sys:'请将以下内容转换为用户指定的文学风格（古风/现代/文艺/口语化等）。'},brainstorm:{name:'头脑风暴',sys:'请围绕用户的创意方向提供多个不同角度的创意方案。'},outline_gen:{name:'大纲生成',sys:'请根据作品信息生成详细故事大纲。用JSON数组格式返回，每项含title和content。'},character_gen:{name:'人物生成',sys:'请根据作品信息设计人物角色，含姓名、角色、性格、背景、外貌、技能。用JSON数组返回。'},chapter_write:{name:'自动写章节',sys:'请根据大纲和人物设定创作完整章节，1500-3000字，含对话和描写。'}};
  renderModes();
}
function renderModes(){const g=document.getElementById('modeGrid');if(!g)return;const groups={'基础':['continue','polish','expand','condense','dialogue'],'进阶':['describe_scene','describe_character','plot_twist','conflict','worldbuild'],'分析':['analyze_plot','feedback','style_mimic','translate_style','brainstorm']};let h='';for(const[label,keys]of Object.entries(groups)){h+='<div style="margin-bottom:8px"><div style="font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;padding:4px 0">'+label+'</div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px">';for(const k of keys){const m=modes[k];if(m)h+='<button onclick="selMode_(\''+k+'\')" data-mode="'+k+'" class="ambtn">'+m.name+'</button>';}h+='</div></div>';}g.innerHTML=h;}
function selMode_(m){document.querySelectorAll('.ambtn').forEach(b=>b.classList.remove('on'));const b=document.querySelector('[data-mode="'+m+'"]');if(b)b.classList.add('on');selMode=m;if(modes[m]){const p=document.getElementById('aiInp');if(p)p.placeholder=modes[m].name+'模式 — 输入要求...';}}

/* ===== Projects ===== */
async function loadProjs(){const ps=await dbAll('projects');ps.sort((a,b)=>(b.updated_at||0)-(a.updated_at||0));const sel=document.getElementById('projSel');sel.innerHTML='<option value="">选择项目...</option>'+ps.map(p=>'<option value="'+p.id+'">'+p.title+'</option>').join('');if(ps.length&&!proj){sel.value=ps[0].id;await loadProj(ps[0].id);}}
function onProjChange(pid){if(pid)loadProj(pid);else{proj=null;active=null;renderAll();showWelcome();}}
async function loadProj(id){const p=await dbGet('projects',id);if(!p)return;const os=await dbByIndex('outlines','project_id',id);const cs=await dbByIndex('characters','project_id',id);const chs=await dbByIndex('chapters','project_id',id);os.sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));chs.sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));proj={project:p,outlines:os,characters:cs,chapters:chs};active=null;renderAll();toast('已加载: '+p.title);hideWelcome();}
async function createProj(){const t=document.getElementById('npTitle').value.trim();if(!t)return toast('请输入名称','error');const now=Date.now();const id=await dbPut('projects',{title:t,genre:document.getElementById('npGenre').value,description:document.getElementById('npDesc').value,world_setting:document.getElementById('npWorld').value,writing_style:'',created_at:now,updated_at:now});await dbPut('outlines',{project_id:id,parent_id:0,title:'第一章',content:'',sort_order:0,created_at:now});hideM('npModal');await loadProjs();document.getElementById('projSel').value=id;await loadProj(id);}
function showWelcome(){const w=document.getElementById('wcard'),e=document.getElementById('earea');if(w)w.style.display='block';if(e)e.style.display='none';}
function hideWelcome(){const w=document.getElementById('wcard'),e=document.getElementById('earea');if(w)w.style.display='none';if(e){e.style.display='flex';e.style.flexDirection='column';e.style.height='100%';}}

/* ===== Render ===== */
function renderAll(){renderOut();renderChars();renderChaps();if(!active){document.getElementById('editor').value='';document.getElementById('eTitle').value='';updateWC();}updateCtx();}
function updateCtx(){const bar=document.getElementById('ctxBar');if(!bar)return;if(!active||!proj){bar.style.display='none';return;}const m={outline:'大纲',character:'人物',chapter:'章节'};bar.textContent='编辑中: '+(m[active.type]||'')+' > '+(active.data?.title||active.data?.name||'');bar.style.display='block';}
function renderOut(){if(!proj)return;const l=document.getElementById('oList');if(!l)return;if(!proj.outlines.length){l.innerHTML='<div style="text-align:center;padding:40px 24px"><p style="font-size:13px;color:var(--t3);margin-bottom:16px">暂无大纲</p><button onclick="aiAuto(\'outline_gen\')" class="cta" style="font-size:13px"><i class="fas fa-magic" style="margin-right:6px"></i>一键生成大纲</button></div>';return;}l.innerHTML=proj.outlines.map(o=>'<div class="litem'+(active?.type==='outline'&&active?.id===o.id?' sel':'')+'" onclick="selOut('+o.id+')"><span style="flex:1;font-size:14px">'+o.title+'</span><button onclick="event.stopPropagation();delItem(\'outlines\',\'outline\','+o.id+')" style="background:none;border:none;color:var(--t3);cursor:pointer"><i class="fas fa-trash" style="font-size:12px"></i></button></div>').join('');}
function renderChars(){if(!proj)return;const l=document.getElementById('chList');if(!l)return;const colors=['#4f46e5','#059669','#d97706','#dc2626','#7c3aed','#0891b2','#be185d'];if(!proj.characters.length){l.innerHTML='<div style="text-align:center;padding:40px 24px"><p style="font-size:13px;color:var(--t3);margin-bottom:16px">暂无人物</p><button onclick="aiAuto(\'character_gen\')" class="cta" style="font-size:13px"><i class="fas fa-magic" style="margin-right:6px"></i>一键生成人物</button></div>';return;}l.innerHTML=proj.characters.map((c,i)=>'<div class="card" onclick="selChar('+c.id+')" style="cursor:pointer"><div style="display:flex;align-items:center"><div style="width:32px;height:32px;border-radius:50%;background:'+(c.avatar_color||colors[i%7])+';color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700">'+c.name[0]+'</div><div style="margin-left:8px;flex:1"><div style="font-size:14px;font-weight:500">'+c.name+'</div><div style="font-size:12px;color:var(--t3)">'+c.role+'</div></div><div style="display:flex;gap:4px"><button onclick="event.stopPropagation();editChar('+c.id+')" style="background:none;border:none;color:#3b82f6;cursor:pointer"><i class="fas fa-edit" style="font-size:12px"></i></button><button onclick="event.stopPropagation();delItem(\'characters\',\'character\','+c.id+')" style="background:none;border:none;color:var(--t3);cursor:pointer"><i class="fas fa-trash" style="font-size:12px"></i></button></div></div><p style="font-size:12px;color:var(--t3);margin-top:4px">'+(c.personality||c.background||'...')+'</p></div>').join('');}
function renderChaps(){if(!proj)return;const l=document.getElementById('cList');if(!l)return;if(!proj.chapters.length){l.innerHTML='<div style="text-align:center;padding:40px 24px"><p style="font-size:13px;color:var(--t3);margin-bottom:16px">暂无章节</p><button onclick="aiAuto(\'chapter_write\')" class="cta" style="font-size:13px"><i class="fas fa-magic" style="margin-right:6px"></i>一键生成章节</button></div>';return;}l.innerHTML=proj.chapters.map(c=>'<div class="litem'+(active?.type==='chapter'&&active?.id===c.id?' sel':'')+'" onclick="selChap('+c.id+')"><div style="flex:1"><div style="font-size:14px">'+c.title+'</div><div style="font-size:12px;color:var(--t3)">'+(c.word_count||0)+'字</div></div><button onclick="event.stopPropagation();delItem(\'chapters\',\'chapter\','+c.id+')" style="background:none;border:none;color:var(--t3);cursor:pointer"><i class="fas fa-trash" style="font-size:12px"></i></button></div>').join('');}

function selChar(id){const c=proj.characters.find(x=>x.id===id);active={type:'character',id,data:c};document.getElementById('eTitle').value=c.name;document.getElementById('editor').value='【'+c.role+'】'+c.name+'\n\n性格：'+(c.personality||'')+'\n\n背景：'+(c.background||'')+'\n\n外貌：'+(c.appearance||c.description||'')+(c.skills?'\n\n技能：'+c.skills:'');updateWC();renderChars();updateCtx();hideWelcome();swTab('editor',document.querySelector('.btab'));}
function selChap(id){const c=proj.chapters.find(x=>x.id===id);active={type:'chapter',id,data:c};document.getElementById('eTitle').value=c.title;document.getElementById('editor').value=c.content;updateWC();renderChaps();updateCtx();hideWelcome();swTab('editor',document.querySelector('.btab'));}

async function addChap(){if(!proj)return toast('请先选择项目','error');const now=Date.now();const id=await dbPut('chapters',{project_id:proj.project.id,outline_id:0,title:'新章节',content:'',word_count:0,sort_order:proj.chapters.length,status:'draft',created_at:now,updated_at:now});proj.chapters.push({id,project_id:proj.project.id,title:'新章节',content:'',word_count:0});renderChaps();toast('已添加');}
function editChar(id){const c=proj.characters.find(x=>x.id===id);editCharId=id;document.getElementById('chTitle').textContent='编辑人物';document.getElementById('chName').value=c.name;document.getElementById('chRole').value=c.role;document.getElementById('chPers').value=c.personality||'';document.getElementById('chBack').value=c.background||'';document.getElementById('chLook').value=c.appearance||c.description||'';document.getElementById('chSkill').value=c.skills||'';showM('charModal');}
async function saveChar(){const d={project_id:proj.project.id,name:document.getElementById('chName').value.trim(),role:document.getElementById('chRole').value,personality:document.getElementById('chPers').value,background:document.getElementById('chBack').value,appearance:document.getElementById('chLook').value,skills:document.getElementById('chSkill').value,description:document.getElementById('chLook').value,avatar_color:'#4f46e5'};if(!d.name)return toast('请输入姓名','error');if(editCharId){d.id=editCharId;await dbPut('characters',d);}else{const id=await dbPut('characters',d);d.id=id;}editCharId=null;hideM('charModal');await loadProj(proj.project.id);toast('已保存');}
async function delItem(store,type,id){if(!confirm('确定删除？'))return;await dbDel(store,id);if(active?.id===id)active=null;await loadProj(proj.project.id);toast('已删除');}
async function saveContent(){if(!active)return toast('请先选择内容','error');const title=document.getElementById('eTitle').value,content=document.getElementById('editor').value;const ss=document.getElementById('sstat');if(ss)ss.textContent='保存中...';if(active.type==='outline'){const o=proj.outlines.find(x=>x.id===active.id);o.title=title;o.content=content;await dbPut('outlines',{...o,title,content});renderOut();}else if(active.type==='chapter'){const c=proj.chapters.find(x=>x.id===active.id);c.title=title;c.content=content;c.word_count=content.length;c.updated_at=Date.now();await dbPut('chapters',{...c,title,content,word_count:content.length,updated_at:Date.now()});renderChaps();}if(ss){ss.textContent='已保存 ✓';setTimeout(()=>ss.textContent='',2000);}}
function updateWC(){const e=document.getElementById('editor'),w=document.getElementById('wc');if(e&&w)w.textContent=e.value.length+'字';}

/* ===== API Settings ===== */
function loadApiUI(){document.getElementById('apiBase').value=localStorage.getItem('api_base')||'';document.getElementById('apiKey').value=localStorage.getItem('api_key')||'';document.getElementById('apiModel').value=localStorage.getItem('api_model')||'';updML();}

function togKey(){const i=document.getElementById('apiKey'),e=document.getElementById('keyEye');if(i.type==='password'){i.type='text';e.className='fas fa-eye-slash';}else{i.type='password';e.className='fas fa-eye';}}
function saveApi(){const k=document.getElementById('apiPreset').value;localStorage.setItem('api_type',PRESETS[k]?.t||'openai');localStorage.setItem('api_base',document.getElementById('apiBase').value.trim());localStorage.setItem('api_key',document.getElementById('apiKey').value.trim());localStorage.setItem('api_model',document.getElementById('apiModel').value.trim());updML();hideM('apiModal');toast('API已保存');}
function updML(){const c=getApi(),l=document.getElementById('mLabel');if(l){l.textContent=c.model||'未配置';l.title=c.base_url;}}
async function testConn(){const btn=document.getElementById('testBtn'),r=document.getElementById('testR');btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> 测试中...';r.style.display='block';r.style.color='var(--t3)';r.textContent='连接中...';try{const cfg=getApi();const text=await callAPI([{role:'user',content:'hi'}],{max_tokens:10});r.style.color='#22c55e';r.textContent='✓ 连接成功: '+cfg.model+' ('+cfg.type+')';}catch(e){r.style.color='#ef4444';r.textContent='✗ '+e.message;}btn.innerHTML='<i class="fas fa-plug"></i> 测试';}

/* ===== AI Core ===== */
function buildCtx(){if(!proj)return'';const p=proj.project,parts=[];parts.push('作品：《'+p.title+'》');if(p.genre)parts.push('类型：'+p.genre);if(p.description)parts.push('简介：'+p.description);if(p.world_setting)parts.push('世界观：'+p.world_setting);if(proj.characters.length)parts.push('人物：'+proj.characters.map(c=>c.name+'('+c.role+':'+(c.personality||'')+')').join('、'));if(proj.outlines.length)parts.push('大纲：'+proj.outlines.map(o=>o.title+(o.content?' - '+o.content:'')).filter(x=>x.length>3).join('；'));return parts.join('\n');}
async function aiGen(){const prompt=document.getElementById('aiInp').value.trim();if(!prompt)return toast('请输入要求','error');if(!proj)return toast('请先选择项目','error');const cfg=getApi();if(!cfg.api_key){toast('请先配置API','error');showM('apiModal');return;}const r=document.getElementById('aiResp'),btn=document.getElementById('aiBtn');r.innerHTML='<div style="color:var(--p)"><i class="fas fa-spinner fa-spin"></i> AI生成中...</div>';btn.disabled=true;try{const m=modes[selMode]||modes.write;const sys=m.sys+'\n\n项目信息：\n'+buildCtx();const extra=document.getElementById('editor').value;if(extra)sys+='\n\n参考内容：\n'+extra;const temp=parseFloat(document.getElementById('aiTemp').value);const tokens=parseInt(document.getElementById('aiTok').value);lastResp=await callAPI([{role:'system',content:sys},{role:'user',content:prompt}],{temperature:temp,max_tokens:tokens});r.innerHTML=fmtResp(lastResp);toast(m.name+'完成');}catch(e){r.textContent='错误: '+e.message;toast('失败','error');}btn.disabled=false;}
async function aiAuto(mode){if(!proj)return toast('请先选择项目','error');const cfg=getApi();if(!cfg.api_key){toast('请先配置API','error');showM('apiModal');return;}const r=document.getElementById('aiResp');r.innerHTML='<div style="color:var(--p)"><i class="fas fa-spinner fa-spin"></i> '+(modes[mode]?.name||'AI')+'生成中...</div>';selMode=mode;try{const m=modes[mode];const sys=m.sys+'\n\n项目信息：\n'+buildCtx();lastResp=await callAPI([{role:'system',content:sys},{role:'user',content:'请自动生成'}],{temperature:0.8,max_tokens:2000});r.innerHTML=fmtResp(lastResp);toast(m.name+'完成');if(mode==='outline_gen'||mode==='character_gen'){try{const arr=JSON.parse(lastResp);if(Array.isArray(arr)){if(mode==='outline_gen'){for(const item of arr){const id=await dbPut('outlines',{project_id:proj.project.id,parent_id:0,title:item.title||'新大纲',content:item.content||'',sort_order:proj.outlines.length,created_at:Date.now()});proj.outlines.push({id,...item,project_id:proj.project.id});}renderOut();}else{const colors=['#4f46e5','#059669','#d97706','#dc2626','#7c3aed'];for(let i=0;i<arr.length;i++){const item=arr[i];const id=await dbPut('characters',{project_id:proj.project.id,name:item.name||'未命名',role:item.role||'配角',personality:item.personality||'',background:item.background||'',appearance:item.description||'',skills:item.skills||'',avatar_color:colors[i%5],created_at:Date.now()});proj.characters.push({id,...item,project_id:proj.project.id});}renderChars();}await loadProj(proj.project.id);}}catch(e){/* not JSON */}}}catch(e){r.textContent='错误: '+e.message;toast('失败','error');}}
function fmtResp(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`(.+?)`/g,'<code>$1</code>').replace(/\n/g,'<br>');}
function insEditor(){if(!lastResp)return toast('没有内容','error');const e=document.getElementById('editor'),p=e.selectionStart;e.value=e.value.slice(0,p)+lastResp+e.value.slice(p);updateWC();toast('已插入');}
function repEditor(){if(!lastResp)return toast('没有内容','error');document.getElementById('editor').value=lastResp;updateWC();toast('已替换');}
function copyResp(){if(!lastResp)return toast('没有内容','error');navigator.clipboard.writeText(lastResp).then(()=>toast('已复制')).catch(()=>toast('失败','error'));}

/* ===== Writing Assistant ===== */
function toggleAssistPanel(show){document.getElementById('assistPanel').style.display=show?'block':'none';}
async function assist(mode){
  const ed=document.getElementById('editor');const text=ed.value.trim();if(!text)return toast('请先写点内容','error');
  const cfg=getApi();if(!cfg.api_key){toast('请先配置API','error');showM('apiModal');return;}
  toggleAssistPanel(true);
  document.getElementById('assistStatus').style.display='block';
  document.getElementById('assistResp').innerHTML='';
  const labelMap={polish:'润色',continue:'续写',condense:'缩写',expand:'扩写',translate:'翻译（中英互译）',rewrite:'改写'};
  const sysMap={polish:'请润色以下文字，保持原意，提升文学性。只返回润色后的内容。',continue:'请续写以下内容，保持风格一致，自然衔接。只返回续写部分。',condense:'请精简压缩以下内容，保留核心情节。只返回精简版。',expand:'请扩写以下内容，增加细节描写。只返回扩写后的内容。',translate:'请翻译以下内容。如果是中文翻译成英文，如果是英文翻译成中文。只返回翻译结果。',rewrite:'请改写以下内容，换一种表达方式但保持原意。只返回改写后的内容。'};
  try{
    const sys=(sysMap[mode]||'请处理以下内容')+'\n\n项目信息：\n'+buildCtx();
    assistLast=await callAPI([{role:'system',content:sys},{role:'user',content:text}],{temperature:0.7,max_tokens:2000});
    document.getElementById('assistResp').innerHTML=fmtResp(assistLast);
    toast(labelMap[mode]+'完成');
  }catch(e){document.getElementById('assistResp').textContent='错误: '+e.message;toast('失败','error');}
  document.getElementById('assistStatus').style.display='none';
}
function assistApplyReplace(){if(!assistLast)return;document.getElementById('editor').value=assistLast;updateWC();toggleAssistPanel(false);toast('已替换');}
function assistApplyAppend(){if(!assistLast)return;const ed=document.getElementById('editor');ed.value+=assistLast;updateWC();toggleAssistPanel(false);toast('已追加');}
function assistCopy(){if(!assistLast)return;navigator.clipboard.writeText(assistLast).then(()=>toast('已复制')).catch(()=>toast('失败','error'));}

/* ===== Multi-AI Compare ===== */
function setAiView(v){aiView=v;document.getElementById('aiSingleView').style.display=v==='single'?'block':'none';document.getElementById('aiMultiView').style.display=v==='multi'?'block':'none';document.getElementById('aiTabSingle').classList.toggle('on',v==='single');document.getElementById('aiTabMulti').classList.toggle('on',v==='multi');}

function loadSlots(){for(let i=1;i<=3;i++){const s=JSON.parse(localStorage.getItem('slot'+i)||'{}');document.getElementById('slot'+i+'Base').value=s.base_url||'';document.getElementById('slot'+i+'Key').value=s.api_key||'';document.getElementById('slot'+i+'Model').value=s.model||'';document.getElementById('slot'+i+'Toggle').classList.toggle('on',!!s.enabled);document.getElementById('slot'+i+'Body').style.display=s.enabled?'block':'none';}}
function toggleSlot(i){const btn=document.getElementById('slot'+i+'Toggle');btn.classList.toggle('on');const body=document.getElementById('slot'+i+'Body');body.style.display=btn.classList.contains('on')?'block':'none';saveSlot(i);}
function saveSlot(i){const s={enabled:document.getElementById('slot'+i+'Toggle').classList.contains('on'),base_url:document.getElementById('slot'+i+'Base').value.trim(),api_key:document.getElementById('slot'+i+'Key').value.trim(),model:document.getElementById('slot'+i+'Model').value.trim(),type:'openai'};const pk=document.getElementById('slot'+i+'Preset').value;if(pk&&PRESETS[pk])s.type=PRESETS[pk].t;localStorage.setItem('slot'+i,JSON.stringify(s));}
function applySlotPreset(i){const pk=document.getElementById('slot'+i+'Preset').value;if(pk&&PRESETS[pk]){document.getElementById('slot'+i+'Base').value=PRESETS[pk].b;document.getElementById('slot'+i+'Model').value=PRESETS[pk].m;}saveSlot(i);}

async function runCompare(){
  const prompt=document.getElementById('cmpInp').value.trim();if(!prompt)return toast('请输入要求','error');
  const slots=[];for(let i=1;i<=3;i++){const s=JSON.parse(localStorage.getItem('slot'+i)||'{}');if(s.enabled&&s.api_key&&s.model)slots.push({idx:i,...s});}
  if(!slots.length)return toast('请至少启用一个槽位','error');
  const btn=document.getElementById('cmpBtn');btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> 并行生成中...';
  const grid=document.getElementById('cmpResults');grid.style.display='grid';grid.innerHTML='';
  for(const s of slots){grid.innerHTML+='<div class="compare-card"><div style="font-size:12px;color:var(--p);font-weight:600;margin-bottom:6px">'+s.model+'</div><div id="cmpSlot'+s.idx+'" style="font-size:13px;color:var(--t3)"><i class="fas fa-spinner fa-spin"></i> 生成中...</div></div>';}
  const sys='你是一个写作助手。'+(proj?'\n\n项目信息：\n'+buildCtx():'');
  const promises=slots.map(async s=>{
    try{
      const text=await callAPIWith(s,[{role:'system',content:sys},{role:'user',content:prompt}],{temperature:0.8,max_tokens:2000});
      const el=document.getElementById('cmpSlot'+s.idx);if(el)el.innerHTML=fmtResp(text);
    }catch(e){const el=document.getElementById('cmpSlot'+s.idx);if(el){el.style.color='var(--err)';el.textContent='错误: '+e.message;}}
  });
  await Promise.all(promises);
  btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane"></i> 并行生成';toast('对比完成');
}
</script>
