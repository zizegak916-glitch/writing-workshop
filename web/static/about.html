    <h1>关于 AI写作工坊</h1>
    <p>AI写作工坊是主体应用，面向小说、长篇内容、角色设定和创作流程管理。</p>
    <p>它可以保存来自 GitHub 的优质开源项目、skill、规则包和你自己的通用能力文件。创作时，前端选择一个后端项目或多个 skill，把上下文传给后端执行，再把输出实时回传到前端。</p>
    <p>后端只是可接入的执行器之一；具体可以使用本地服务、自部署服务，或适配第三方开源项目。</p>
    <p>源码：<a href="https://github.com/zizegak916-glitch/writing-workshop">GitHub 仓库</a></p>
