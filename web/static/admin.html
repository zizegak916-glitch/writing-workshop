<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ainovel-cli 管理后台</title>
<style>
:root{--bg:#0b0c0f;--panel:#15161a;--card:#1b1d22;--border:rgba(255,255,255,.08);--text:#eceef3;--muted:#8f96a3;--accent:#5e6ad2;--red:#f87171;--green:#34d399}
body.light{--bg:#f4f6fa;--panel:#fff;--card:#f8f9fc;--border:#dfe3ec;--text:#111827;--muted:#667085}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:14px/1.5 Inter,"Noto Sans SC","Microsoft YaHei",system-ui,sans-serif}
header{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid var(--border);background:var(--panel);position:sticky;top:0;z-index:2}
h1{font-size:16px;margin:0}.wrap{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 52px)}
nav{border-right:1px solid var(--border);background:var(--panel);padding:14px}.tab{width:100%;display:block;text-align:left;background:transparent;color:var(--muted);border:0;border-radius:8px;padding:10px 12px;cursor:pointer}.tab.active,.tab:hover{background:var(--card);color:var(--text)}
main{padding:18px;max-width:1100px}.panel{display:none}.panel.active{display:block}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:14px}
label{display:block;color:var(--muted);font-size:12px;margin:10px 0 6px}input,select,textarea{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px;font:inherit}textarea{min-height:150px;resize:vertical}
button.primary{background:var(--accent);border:0;color:#fff;border-radius:8px;padding:10px 14px;cursor:pointer}button.danger{background:transparent;border:1px solid var(--red);color:var(--red);border-radius:8px;padding:9px 12px;cursor:pointer}
pre{white-space:pre-wrap;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;max-height:360px;overflow:auto}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.list-item{padding:10px;border-bottom:1px solid var(--border)}
@media(max-width:760px){.wrap{grid-template-columns:1fr}nav{display:flex;overflow:auto;border-right:0;border-bottom:1px solid var(--border)}.tab{white-space:nowrap}.grid{grid-template-columns:1fr}main{padding:12px}}
</style>
</head>
<body>
<header><h1>ainovel-cli 管理后台</h1><div class="row"><a style="color:var(--muted)" href="/app.html">写作工坊</a><button class="primary" onclick="document.body.classList.toggle('light')">主题</button></div></header>
<div class="wrap">
<nav>
  <button class="tab active" onclick="showTab('config',this)">配置</button>
  <button class="tab" onclick="showTab('projects',this)">项目</button>
  <button class="tab" onclick="showTab('characters',this)">角色</button>
  <button class="tab" onclick="showTab('rules',this)">规则</button>
  <button class="tab" onclick="showTab('test',this)">API 测试</button>
</nav>
<main>
  <section id="config" class="panel active card">
    <h2>配置编辑</h2>
    <div class="grid">
      <div><label>Provider</label><input id="provider"></div>
      <div><label>Model</label><input id="model"></div>
      <div><label>Type</label><input id="ptype" placeholder="openai / anthropic / gemini"></div>
      <div><label>Base URL</label><input id="baseUrl"></div>
    </div>
    <label>API Key</label><input id="apiKey" type="password" placeholder="留空则保持原值或使用环境变量">
    <p class="row"><button class="primary" onclick="saveConfig()">保存配置</button><span id="configMsg"></span></p>
  </section>
  <section id="projects" class="panel card">
    <h2>项目管理</h2>
    <div id="projectList"></div>
    <h3>创建/更新当前项目</h3>
    <label>名称</label><input id="projectName">
    <label>前提/简介</label><textarea id="projectPremise"></textarea>
    <label>总章节数</label><input id="totalChapters" type="number" min="0">
    <p class="row"><button class="primary" onclick="saveProject()">保存项目</button><button class="danger" onclick="deleteProject()">删除当前项目文件</button></p>
  </section>
  <section id="characters" class="panel card">
    <h2>角色管理</h2>
    <div id="charList"></div>
    <label>姓名</label><input id="charName">
    <label>定位</label><input id="charRole">
    <label>设定</label><textarea id="charDesc"></textarea>
    <label>角色弧线</label><input id="charArc">
    <p><button class="primary" onclick="saveCharacter()">保存角色</button></p>
  </section>
  <section id="rules" class="panel card">
    <h2>规则管理</h2>
    <div id="presetList"></div>
    <label>项目规则</label><textarea id="rulesRaw"></textarea>
    <p class="row"><button class="primary" onclick="saveRules()">保存规则</button><button class="danger" onclick="deleteRules()">清空 Web 规则</button></p>
    <pre id="rulesInfo"></pre>
  </section>
  <section id="test" class="panel card">
    <h2>API 测试</h2>
    <label>提示词</label><textarea id="testPrompt">回复 OK，并说明当前模型可用。</textarea>
    <p><button class="primary" onclick="testAI()">发送测试</button></p>
    <pre id="testResult"></pre>
  </section>
</main>
</div>
<script>
async function api(url,opt={}){const r=await fetch(url,{headers:{'Content-Type':'application/json',...(opt.headers||{})},...opt});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||('HTTP '+r.status));return d}
function showTab(id,btn){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById(id).classList.add('active');btn.classList.add('active')}
async function loadAll(){await Promise.all([loadConfig(),loadProjects(),loadChars(),loadRules()])}
async function loadConfig(){const d=await api('/api/config');const c=d.config||d;provider.value=c.provider||'';model.value=c.model||'';const pc=(c.providers||{})[c.provider]||{};ptype.value=pc.type||'';baseUrl.value=pc.base_url||''}
async function saveConfig(){try{await api('/api/config',{method:'POST',body:JSON.stringify({provider:provider.value,model:model.value,type:ptype.value,base_url:baseUrl.value,api_key:apiKey.value})});configMsg.textContent='已保存'}catch(e){configMsg.textContent=e.message}}
async function loadProjects(){const ps=await api('/api/projects');projectList.innerHTML=(ps||[]).map(p=>`<div class="list-item"><b>${p.name}</b><br><small>${p.store_dir||''}</small></div>`).join('')||'<p style="color:var(--muted)">暂无项目</p>';const p=ps[0];if(p){projectName.value=p.name||'';projectPremise.value=p.premise||'';totalChapters.value=p.total_chapters||0}}
async function saveProject(){await api('/api/projects',{method:'POST',body:JSON.stringify({name:projectName.value,premise:projectPremise.value,total_chapters:Number(totalChapters.value||0)})});loadProjects()}
async function deleteProject(){if(confirm('确认删除当前输出目录中的项目文件？')){await api('/api/projects',{method:'DELETE'});loadProjects()}}
async function loadChars(){const cs=await api('/api/characters');charList.innerHTML=(cs||[]).map(c=>`<div class="list-item" onclick='editChar(${JSON.stringify(c)})'><b>${c.name}</b> ${c.role||''}<br>${c.description||''}</div>`).join('')||'<p style="color:var(--muted)">暂无角色</p>'}
function editChar(c){charName.value=c.name||'';charRole.value=c.role||'';charDesc.value=c.description||'';charArc.value=c.arc||''}
async function saveCharacter(){await api('/api/characters',{method:'PUT',body:JSON.stringify({name:charName.value,role:charRole.value,description:charDesc.value,arc:charArc.value})});loadChars()}
async function loadRules(){const d=await api('/api/rules');rulesRaw.value=d.custom||d.preferences||'';rulesInfo.textContent=JSON.stringify({structured:d.structured,sources:d.sources,conflicts:d.conflicts},null,2);presetList.innerHTML=(d.presets||[]).map(p=>`<button class="primary" style="margin:0 8px 8px 0" onclick="rulesRaw.value=${JSON.stringify(p.content)}">${p.name}</button>`).join('')}
async function saveRules(){await api('/api/rules',{method:'POST',body:JSON.stringify({raw:rulesRaw.value})});loadRules()}
async function deleteRules(){await api('/api/rules',{method:'DELETE'});loadRules()}
async function testAI(){testResult.textContent='请求中...';try{const d=await api('/api/ai',{method:'POST',body:JSON.stringify({message:testPrompt.value})});testResult.textContent=d.choices?.[0]?.message?.content||JSON.stringify(d,null,2)}catch(e){testResult.textContent=e.message}}
loadAll().catch(e=>alert(e.message));
</script>
</body>
</html>
