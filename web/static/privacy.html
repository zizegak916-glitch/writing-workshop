    <h1>隐私政策</h1>
    <p>GitHub Pages 静态页面本身不收集账号信息。写作工坊的数据默认保存在浏览器本地或你运行的本地 ainovel-cli 工作目录中。</p>
    <p>当你使用 AI 功能时，请求内容会发送到你配置的本地后端，再由后端转发给所选 LLM provider。具体数据处理规则取决于你选择的 provider。</p>
    <p>API Key 建议保存在本地配置或环境变量中，不建议提交到仓库。</p>
