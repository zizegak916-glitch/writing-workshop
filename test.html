<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="background:#111;color:#fff;font-family:sans-serif;padding:20px">
<h2>按钮测试</h2>
<button onclick="alert('按钮A工作正常!')" style="font-size:20px;padding:20px;margin:10px;background:#5e6ad2;color:#fff;border:none;border-radius:8px">按钮 A (alert)</button>
<button onclick="document.getElementById('result').textContent='按钮B被点击了!'" style="font-size:20px;padding:20px;margin:10px;background:#2ecc71;color:#fff;border:none;border-radius:8px">按钮 B (改文字)</button>
<button onclick="fetch('http://127.0.0.1:8090/').then(r=>r.text()).then(t=>document.getElementById('result').textContent='fetch成功:'+t.length+'字节')" style="font-size:20px;padding:20px;margin:10px;background:#e74c3c;color:#fff;border:none;border-radius:8px">按钮 C (fetch)</button>
<div id="result" style="margin-top:20px;font-size:18px;padding:15px;background:#333;border-radius:8px;min-height:40px">等待点击...</div>
<script>document.title='TEST PAGE OK';</script>
</body>
</html>
