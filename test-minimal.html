<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
body { margin:0; background:#08090a; color:#fff; font-family:system-ui; }
.topbar { height:52px; background:#111214; border-bottom:1px solid #222; display:flex; align-items:center; padding:0 20px; gap:10px; position:relative; z-index:10; }
.topbar-logo { font-size:17px; font-weight:600; }
.topbar-sep { width:1px; height:20px; background:#333; }
.project-selector { display:flex; align-items:center; gap:4px; padding:4px 10px; border-radius:8px; cursor:pointer; }
.topbar-actions { display:flex; gap:6px; }
.icon-btn { width:44px; height:44px; background:transparent; border:1px solid transparent; border-radius:8px; color:#888; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; }
.icon-btn:hover { background:rgba(255,255,255,0.06); color:#fff; }
.info { padding:20px; color:#0f0; font:14px monospace; }
</style>
</head>
<body>
<div class="topbar">
    <div class="topbar-logo" style="color:#ff4444"><span class="dot" style="background:#ff4444;box-shadow:0 0 8px #ff4444"></span>AI 写作工坊 v2.1 🔴</div>
    <div class="topbar-sep"></div>
    <div class="project-selector" onclick="openModal('projectModal')" title="选择项目..."><span id="currentProjectName" data-empty-project="1">选择项目...</span><span class="arrow">▾</span></div>
    <div class="topbar-stats">
      <div class="stat-item"><svg class="ic ic-sm"><use href="#ic-note"/></svg> 总 <span class="val" id="totalWords">0</span>字</div>
      <div class="stat-item"><svg class="ic ic-sm"><use href="#ic-calendar"/></svg> 今日 <span class="val" id="todayWords">0</span>字</div>
      <div class="stat-item"><svg class="ic ic-sm"><use href="#ic-target"/></svg> <span class="badge" id="goalText">0/2000</span></div>
    </div>
<div class="info">
<p>👆 点上面每个按钮</p>
<div id="log"></div>
</div>
<script>
function openModal(id){ document.getElementById('log').innerHTML+='<p style="color:#0f0">openModal('+id+') CALLED!</p>'; }
function exportProject(){ document.getElementById('log').innerHTML+='<p style="color:#0f0">exportProject() CALLED!</p>'; }
function saveDoc(){ document.getElementById('log').innerHTML+='<p style="color:#0f0">saveDoc() CALLED!</p>'; }
</script>
</body>
</html>
