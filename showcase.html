<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI 写作工坊 - 界面展示</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Noto Sans SC',sans-serif;background:#0a0c12;color:#e8eaf2;display:flex;flex-direction:column;align-items:center;padding:20px 16px 60px}
h1{font-size:22px;font-weight:700;margin:20px 0 6px;color:#eef0f6}
.sub{font-size:13px;color:#7a8299;margin-bottom:30px}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:720px;width:100%}
.card{background:#13161e;border:1px solid #2a2f3f;border-radius:14px;overflow:hidden;transition:transform .2s}
.card:hover{transform:translateY(-4px)}
.card svg{width:100%;height:auto;display:block}
.card-info{padding:12px 14px}
.card-title{font-size:14px;font-weight:600;color:#eef0f6;margin-bottom:3px}
.card-desc{font-size:11px;color:#7a8299;line-height:1.5}
.cta-area{text-align:center;margin-top:36px;max-width:500px}
.cta-text{font-size:16px;color:#8b8fc7;line-height:1.8;margin-bottom:16px}
.cta-link{display:inline-block;background:linear-gradient(135deg,#6c9bff,#7c5cbf);color:#fff;padding:12px 32px;border-radius:10px;font-size:15px;font-weight:600;text-decoration:none;transition:all .2s;box-shadow:0 4px 16px rgba(108,155,255,0.3)}
.cta-link:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(108,155,255,0.4)}
.footer{margin-top:40px;font-size:11px;color:#3d4560;text-align:center}
@media(max-width:560px){.cards{grid-template-columns:1fr}}
</style>
</head>
<body>
