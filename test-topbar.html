<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
/* ============================================================
   Writing Workshop — Linear-Inspired Design System
   Mobile-first · Dark/Light · Premium Typography
   ============================================================ */

/* ─── 1. DESIGN TOKENS ─────────────────────────────────────── */

:root {
  /* Backgrounds — refined depth hierarchy */
  --bg-deep: #090a0b;
  --bg-mid: #111214;
  --bg-panel: #1a1b1e;
  --bg-card: #1a1b1e;
  --bg-hover: rgba(255, 255, 255, 0.05);
  --bg-active: rgba(255, 255, 255, 0.09);
  --bg-elevated: #1f2023;

  /* Borders — subtle but visible */
  --border: rgba(255, 255, 255, 0.06);
  --border-light: rgba(255, 255, 255, 0.10);
  --border-focus: rgba(94, 106, 210, 0.5);

  /* Accent — Linear purple */
  --accent: #5e6ad2;
  --accent-dim: #4f5bc0;
  --accent-bright: #7b85e0;
  --accent-glow: rgba(94, 106, 210, 0.14);
  --accent-glow-strong: rgba(94, 106, 210, 0.25);

  /* Semantic Colors */
  --gold: #f0b429;
  --green: #34d399;
  --green-dim: rgba(52, 211, 153, 0.12);
  --red: #f87171;
  --red-dim: rgba(248, 113, 113, 0.12);
  --purple: #a78bfa;
  --blue: #60a5fa;

  /* Text — warm whites, clear hierarchy */
  --text-primary: #ededef;
  --text-secondary: #a1a5b0;
  --text-muted: #6b7080;
  --text-hint: #4a4e58;

  /* Radii — modern, softer */
  --radius: 10px;
  --radius-sm: 7px;
  --radius-lg: 14px;
  --radius-xl: 18px;

  /* Shadows — layered depth */
  --shadow: 0 0 0 1px rgba(255, 255, 255, 0.04);
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.12);
  --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.2);
  --shadow-lg: 0 0 0 1px rgba(255, 255, 255, 0.04), 0 8px 40px rgba(0, 0, 0, 0.35);
  --shadow-glow: 0 0 20px rgba(94, 106, 210, 0.15);

  /* Fonts */
  --font-sans: 'Inter', 'Noto Sans SC', sans-serif;
  --font-serif: 'Inter', 'Noto Serif SC', serif;
  --font-mono: 'JetBrains Mono', monospace;

  /* Layout */
  --sidebar-w: 260px;
  --ai-panel-w: 340px;
  --topbar-h: 52px;

  /* Transitions */
  --ease: cubic-bezier(0.25, 0.1, 0.25, 1);
  --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
  --duration: 180ms;
}


/* ─── 2. LIGHT THEME ───────────────────────────────────────── */

body.light {
  /* ── Surface hierarchy: deeper = darker, cards = brighter white ── */
  --bg-deep: #eef0f4;
  --bg-mid: #ffffff;
  --bg-panel: #f7f8fb;
  --bg-card: #ffffff;
  --bg-hover: #e9ecf2;
  --bg-active: #dfe3ec;
  --bg-elevated: #ffffff;

  /* ── Borders: crisper contrast on white surfaces ── */
  --border: #d8dce6;
  --border-light: #e5e8f0;
  --border-focus: rgba(91, 99, 208, 0.5);

  /* ── Accent: stronger glow for visibility on white ── */
  --accent: #5b63d0;
  --accent-dim: #4a52b8;
  --accent-bright: #6e7ae2;
  --accent-glow: rgba(91, 99, 208, 0.10);
  --accent-glow-strong: rgba(91, 99, 208, 0.18);

  /* ── Semantic colors ── */
  --gold: #c88a08;
  --green: #16a34a;
  --green-dim: rgba(22, 163, 74, 0.10);
  --red: #dc2626;
  --red-dim: rgba(220, 38, 38, 0.08);
  --purple: #7c3aed;
  --blue: #2563eb;

  /* ── Text: stronger contrast for readability ── */
  --text-primary: #111320;
  --text-secondary: #4a5068;
  --text-muted: #7c829a;
  --text-hint: #a0a6ba;

  /* ── Multi-level shadow system ── */
  --shadow: 0 0 0 1px rgba(0, 0, 0, 0.04);
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06);
  --shadow-lg: 0 0 0 1px rgba(0, 0, 0, 0.04), 0 8px 32px rgba(0, 0, 0, 0.08);
  --shadow-glow: 0 0 20px rgba(91, 99, 208, 0.10);
  --accent-glow-focus: rgba(91, 99, 208, 0.25);
}

body.light .focus-overlay {
  background: rgba(255, 255, 255, 0.92);
}

body.light .focus-editor {
  color: #1a1d28;
}

body.light .focus-info {
  color: rgba(0, 0, 0, 0.35);
}

body.light .focus-exit {
  border-color: rgba(0, 0, 0, 0.2);
  color: rgba(0, 0, 0, 0.5);
}

body.light .focus-exit:hover {
  background: rgba(0, 0, 0, 0.05);
  color: rgba(0, 0, 0, 0.8);
}


/* ─── 3. RESET & BASE ──────────────────────────────────────── */

*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: var(--font-sans);
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow: hidden;
  font-size: 14px;
  font-feature-settings: 'cv01', 'ss03';
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  line-height: 1.5;
  touch-action: manipulation;
}


/* ─── 4. KEYFRAME ANIMATIONS ───────────────────────────────── */

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(12px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes slideDown {
  from {
    opacity: 0;
    transform: translateY(-8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes popUp {
  from {
    opacity: 0;
    transform: translateX(-50%) translateY(12px);
  }
  to {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
}

@keyframes modalIn {
  from {
    opacity: 0;
    transform: scale(0.95);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}

@keyframes toastIn {
  from {
    opacity: 0;
    transform: translateX(-50%) translateY(60px) scale(0.95);
  }
  to {
    opacity: 1;
    transform: translateX(-50%) translateY(0) scale(1);
  }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}


/* ─── 5. SCROLLBAR ─────────────────────────────────────────── */

::-webkit-scrollbar {
  width: 4px;
  height: 4px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
  background: var(--border-light);
}


/* ─── 6. FOCUS & TRANSITION UTILITIES ──────────────────────── */

/* All interactive elements get smooth transitions */
button,
input,
textarea,
select,
[role="button"],
[tabindex] {
  transition: all var(--duration) var(--ease);
}

/* Accent focus ring for all inputs */
input:focus,
textarea:focus,
select:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}


/* ─── 7. ICON CLASSES ──────────────────────────────────────── */

.ic {
  display: inline-block;
  width: 18px;
  height: 18px;
  vertical-align: middle;
  fill: none;
}

.ic-sm {
  width: 14px;
  height: 14px;
}

.nav-tab .ic,
.btab .ic {
  width: 18px;
  height: 18px;
  margin-bottom: 2px;
}

.mode-btn .ic {
  width: 16px;
  height: 16px;
}


/* ─── 8. SPINNER ───────────────────────────────────────────── */

.spinner {
  width: 14px;
  height: 14px;
  border: 2px solid rgba(255, 255, 255, 0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}


/* ─── 9. LOCK SCREEN ───────────────────────────────────────── */

#lockScreen {
  position: fixed;
  inset: 0;
  background: var(--bg-deep);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
  background-image: radial-gradient(
    ellipse 60% 60% at 50% 40%,
    rgba(94, 106, 210, 0.08) 0%,
    transparent 70%
  );
}

body.light #lockScreen {
  background-image: radial-gradient(
    ellipse 60% 60% at 50% 40%,
    rgba(94, 106, 210, 0.10) 0%,
    transparent 70%
  );
}

.lock-box {
  width: 380px;
  max-width: 90vw;
  background: var(--bg-panel);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-xl);
  padding: 44px 36px;
  box-shadow: var(--shadow-lg), var(--shadow-glow);
  text-align:center;
  animation: modalIn 0.35s var(--ease-bounce);
}

.lock-icon {
  width: 60px;
  height: 60px;
  background: var(--accent-glow);
  border: 1px solid var(--accent);
  border-radius: var(--radius-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  margin: 0 auto 20px;
  color: var(--accent);
}

.lock-title {
  font-family: var(--font-serif);
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 6px;
  letter-spacing: -0.03em;
}

.lock-sub {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 28px;
  line-height: 1.6;
}

.lock-input {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  padding: 12px 16px;
  font-size: 16px;
  letter-spacing: 3px;
  color: var(--text-primary);
  text-align: center;
  outline: none;
  font-family: var(--font-mono);
  margin-bottom: 16px;
}

.lock-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.lock-input::placeholder {
  letter-spacing: 0;
  color: var(--text-muted);
  font-size: 13px;
  font-family: var(--font-sans);
}

.lock-hint {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 20px;
}

.lock-hint span {
  color: var(--accent);
  cursor: pointer;
}

.lock-privacy {
  font-size: 11px;
  color: var(--text-hint);
  margin-top: 12px;
  line-height: 1.5;
}


/* ─── 10. BUTTONS ──────────────────────────────────────────── */

.btn-primary {
  width: 100%;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  padding: 13px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--font-sans);
  transition: all var(--duration) var(--ease);
  letter-spacing: -0.01em;
}

.btn-primary:hover {
  background: var(--accent-bright);
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(94, 106, 210, 0.35);
}

.btn-primary:active {
  transform: translateY(0);
  box-shadow: none;
}

.btn-primary:focus-visible {
  outline: none;
  box-shadow: 0 0 0 3px var(--accent-glow-strong);
}

.btn-confirm {
  flex: 2 1 150px;
  min-width: 0;
  padding: 10px 14px;
  border-radius: var(--radius);
  background: var(--accent);
  border: none;
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--font-sans);
  white-space: normal;
  line-height: 1.35;
  transition: all var(--duration) var(--ease);
}

.btn-confirm:hover {
  background: var(--accent-bright);
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(94, 106, 210, 0.3);
}

.btn-confirm:active {
  transform: translateY(0);
  box-shadow: none;
}

.btn-cancel {
  flex: 1 1 120px;
  min-width: 0;
  padding: 10px 14px;
  border-radius: var(--radius);
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  font-family: var(--font-sans);
  white-space: normal;
  line-height: 1.35;
  transition: all var(--duration) var(--ease);
}

.btn-cancel:hover {
  background: var(--bg-hover);
  border-color: var(--border-light);
  color: var(--text-primary);
}


/* ─── 11. APP LAYOUT ───────────────────────────────────────── */

#app {
  display: none;
  height: 100vh;
  flex-direction: column;
}

#app.visible {
  display: flex;
}

.main-body {
  flex: 1;
  display: flex;
  overflow: hidden;
}


/* ─── 12. TOPBAR ───────────────────────────────────────────── */

.topbar {
  height: var(--topbar-h);
  background: var(--bg-mid);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 10px;
  flex-shrink: 0;
  z-index: 10;
}

.topbar-logo {
  font-family: var(--font-serif);
  font-size: 17px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
  letter-spacing: -0.03em;
}

.topbar-logo .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent), 0 0 16px rgba(94, 106, 210, 0.3);
  animation: pulse 2s ease infinite;
}

.topbar-sep {
  width: 1px;
  height: 24px;
  background: var(--border);
  margin: 0 4px;
}

.project-selector {
  flex: 1 1 0;
  min-width: 0;
  max-width: 240px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 7px 12px;
  color: var(--text-secondary);
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  font-family: var(--font-sans);
  transition: all var(--duration) var(--ease);
}

.project-selector:hover {
  border-color: var(--accent);
  color: var(--text-primary);
  background: var(--bg-card);
}

#currentProjectName {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.project-selector .arrow {
  flex: 0 0 auto;
}

.topbar-stats {
  display: flex;
  gap: 16px;
  margin-left: auto;
}

.stat-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  color: var(--text-muted);
}

.stat-item .val {
  color: var(--text-secondary);
  font-weight: 500;
}

.stat-item .badge {
  background: var(--green-dim);
  color: var(--green);
  padding: 2px 6px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 510;
}

.topbar-actions {
  display: flex;
  gap: 6px;
}

.icon-btn {
  width: 34px;
  height: 34px;
  background: transparent;
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  position: relative;
  transition: all var(--duration) var(--ease);
}

.icon-btn:hover {
  background: var(--bg-hover);
  border-color: var(--border-light);
  color: var(--text-primary);
  transform: scale(1.05);
}

.icon-btn:active {
  background: var(--bg-active);
  transform: scale(0.97);
}

.icon-btn:focus-visible {
  outline: none;
  box-shadow: 0 0 0 2px var(--accent-glow-strong);
}

.save-badge {
  position: absolute;
  top: 2px;
  right: 2px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--gold);
  display: none;
}

.unsaved .save-badge {
  display: block;
}


/* ─── 13. SIDEBAR ──────────────────────────────────────────── */

.sidebar {
  width: var(--sidebar-w);
  background: var(--bg-mid);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}

.sidebar-nav {
  display: flex;
  border-bottom: 1px solid var(--border);
}

.nav-tab {
  flex: 1;
  padding: 10px 4px;
  background: transparent;
  border: none;
  color: var(--text-muted);
  font-size: 11px;
  font-family: var(--font-sans);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all var(--duration) var(--ease);
}

.nav-tab span {
  font-size: 16px;
}

.nav-tab:hover {
  color: var(--text-secondary);
  background: var(--bg-hover);
}

.nav-tab.active {
  color: var(--accent-bright);
  border-bottom-color: var(--accent);
}

.sidebar-content {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
}

.sidebar-content::-webkit-scrollbar {
  width: 3px;
}

.sidebar-content::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 3px;
}

.section-label {
  font-size: 10px;
  font-weight: 510;
  letter-spacing: 1.2px;
  color: var(--text-hint);
  text-transform: uppercase;
  margin: 8px 0 6px;
  padding: 0 4px;
}

.outline-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  color: var(--text-secondary);
  font-size: 13px;
  position: relative;
  margin-bottom: 2px;
}

.outline-item:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.outline-item.active {
  background: var(--accent-glow);
  color: var(--accent);
}

.outline-item .oi-icon {
  font-size: 14px;
  flex-shrink: 0;
}

.outline-item .oi-text {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.outline-item .oi-count {
  font-size: 10px;
  color: var(--text-hint);
  background: var(--bg-deep);
  padding: 1px 5px;
  border-radius: 10px;
}

.outline-item .oi-del {
  display: none;
  background: none;
  border: none;
  color: var(--text-hint);
  cursor: pointer;
  font-size: 12px;
  padding: 2px;
}

.outline-item:hover .oi-del {
  display: block;
}

.add-item-btn {
  width: 100%;
  padding: 8px 10px;
  background: transparent;
  border: 1px dashed var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-hint);
  font-size: 12px;
  cursor: pointer;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-sans);
  margin-top: 4px;
}

.add-item-btn:hover {
  border-color: var(--accent-dim);
  color: var(--accent);
  background: var(--accent-glow);
}


/* ─── 14. CHARACTER CARDS ──────────────────────────────────── */

.char-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px;
  margin-bottom: 6px;
  cursor: pointer;
}

.char-card:hover {
  border-color: var(--border-light);
  background: var(--bg-hover);
}

.char-name {
  font-size: 13px;
  font-weight: 510;
  color: var(--text-primary);
  margin-bottom: 3px;
}

.char-role {
  display: inline-block;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 10px;
  background: var(--accent-glow);
  color: var(--accent);
}

.char-desc {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 5px;
  line-height: 1.5;
}

.char-actions {
  display: none;
  gap: 4px;
  margin-top: 6px;
}

.char-card:hover .char-actions {
  display: flex;
}

.char-act-btn {
  padding: 3px 8px;
  border-radius: 4px;
  background: var(--bg-hover);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-size: 10px;
  cursor: pointer;
  font-family: var(--font-sans);
}

.char-act-btn:hover {
  background: var(--bg-active);
  border-color: var(--border-light);
}


/* ─── 15. EDITOR ───────────────────────────────────────────── */

.editor-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg-deep);
}

.editor-toolbar {
  padding: 8px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--bg-mid);
  flex-wrap: wrap;
}

.toolbar-group {
  display: flex;
  gap: 3px;
  align-items: center;
}

.toolbar-sep {
  width: 1px;
  height: 20px;
  background: var(--border);
  margin: 0 3px;
}

.tool-btn {
  padding: 5px 10px;
  border-radius: var(--radius-sm);
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  font-family: var(--font-sans);
  display: flex;
  align-items: center;
  gap: 5px;
  transition: all var(--duration) var(--ease);
}

.tool-btn:hover {
  background: var(--bg-hover);
  border-color: var(--border-light);
  color: var(--text-primary);
}

.tool-btn.active {
  background: var(--accent-glow);
  border-color: var(--accent);
  color: var(--accent-bright);
}

.tool-btn:active {
  background: var(--bg-active);
  transform: scale(0.97);
}

.chapter-title-bar {
  padding: 20px 32px 0;
}

.chapter-title-input {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  font-family: var(--font-serif);
  font-size: 26px;
  font-weight: 600;
  color: var(--text-primary);
  padding: 0;
  letter-spacing: -0.03em;
  line-height: 1.3;
}

.chapter-title-input::placeholder {
  color: var(--text-hint);
}

.chapter-title-input:focus {
  border-color: transparent;
  box-shadow: none;
}

.chapter-meta {
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  gap: 16px;
  padding: 8px 32px;
}

.chapter-meta span {
  display: flex;
  align-items: center;
  gap: 4px;
}

.editor-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 8px 32px 40px;
  max-width: 100%;
}

.editor-wrap::-webkit-scrollbar {
  width: 4px;
}

.editor-wrap::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 4px;
}

#mainEditor {
  width: 100%;
  min-height: 400px;
  background: transparent;
  border: none;
  outline: none;
  resize: none;
  font-family: var(--font-serif);
  font-size: 16px;
  line-height: 1.85;
  color: var(--text-primary);
  caret-color: var(--accent);
  font-feature-settings: 'cv01', 'ss03';
  letter-spacing: 0.01em;
}

#mainEditor::placeholder {
  color: var(--text-muted);
  font-style: italic;
}


/* ─── 16. BOTTOM BAR ───────────────────────────────────────── */

.bottom-bar {
  padding: 8px 20px;
  border-top: 1px solid var(--border);
  background: var(--bg-mid);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.wc-info {
  display: flex;
  gap: 16px;
}

.wc-item {
  font-size: 11px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 5px;
}

.wc-item strong {
  color: var(--text-secondary);
}

.goal-bar-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
}

.goal-track {
  width: 100px;
  height: 4px;
  background: var(--bg-card);
  border-radius: 2px;
  overflow: hidden;
}

.goal-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  width: 0%;
  transition: width 0.5s var(--ease);
}


/* ─── 17. AI PANEL ─────────────────────────────────────────── */

.ai-panel {
  width: var(--ai-panel-w);
  background: var(--bg-mid);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.ai-panel-header {
  padding: 14px 16px 0;
  border-bottom: 1px solid var(--border);
}

.ai-panel-title {
  font-size: 13px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
  letter-spacing: -0.01em;
}

.ai-panel-title .dot-pulse {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
  animation: pulse 2s infinite;
}

.ai-tabs {
  display: flex;
  gap: 2px;
  margin-bottom: -1px;
  flex-wrap: wrap;
}

.ai-tab {
  padding: 7px 12px;
  border-radius: 6px 6px 0 0;
  background: transparent;
  border: 1px solid transparent;
  border-bottom: none;
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  font-family: var(--font-sans);
  min-width: 0;
  white-space: normal;
  line-height: 1.25;
  transition: all var(--duration) var(--ease);
}

.ai-tab:hover {
  color: var(--text-secondary);
  background: var(--bg-hover);
}

.ai-tab.active {
  background: var(--bg-deep);
  color: var(--accent-bright);
  border-color: var(--border);
  border-bottom-color: var(--bg-deep);
}

.ai-panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 14px 12px;
}

.ai-panel-body::-webkit-scrollbar {
  width: 3px;
}

.ai-panel-body::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 3px;
}

/* Mode Groups */
.mode-group {
  margin-bottom: 16px;
}

.mode-group-title {
  font-size: 10px;
  font-weight: 510;
  letter-spacing: 1.4px;
  color: var(--text-hint);
  text-transform: uppercase;
  margin-bottom: 6px;
  padding: 0 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.mode-group-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.mode-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
}

.mode-btn {
  padding: 8px 6px;
  border-radius: var(--radius-sm);
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  text-align: center;
  font-family: var(--font-sans);
  line-height: 1.3;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}

.mode-btn:hover {
  background: var(--bg-hover);
  border-color: var(--border-light);
  color: var(--text-primary);
}

.mode-btn.selected {
  background: var(--accent-glow);
  border-color: var(--accent-dim);
  color: var(--accent);
}

.mode-btn .micon {
  font-size: 15px;
}

/* Parameter controls */
.param-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  gap: 8px;
  flex-wrap: wrap;
}

.param-label {
  font-size: 12px;
  color: var(--text-secondary);
  min-width: 0;
}

.seg-ctrl {
  display: flex;
  gap: 2px;
  flex-wrap: wrap;
  justify-content: flex-end;
  min-width: 0;
}

.seg-btn {
  padding: 5px 9px;
  border-radius: var(--radius-sm);
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 11px;
  cursor: pointer;
  font-family: var(--font-sans);
  white-space: normal;
  line-height: 1.25;
  transition: all var(--duration) var(--ease);
}

.seg-btn:hover {
  color: var(--text-secondary);
  border-color: var(--border-light);
}

.seg-btn.on {
  background: var(--accent-glow);
  border-color: var(--accent);
  color: var(--accent-bright);
  font-weight: 600;
}


/* ─── 18. AI PROMPT ────────────────────────────────────────── */

.ai-prompt-area {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
  margin-bottom: 10px;
  transition: border-color var(--duration) var(--ease);
}

.ai-prompt-area:focus-within {
  border-color: var(--accent);
}

.ai-prompt-area label {
  font-size: 10px;
  color: var(--text-hint);
  display: block;
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

#aiPrompt {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  resize: none;
  font-family: var(--font-sans);
  font-size: 12px;
  line-height: 1.6;
  color: var(--text-primary);
  min-height: 60px;
}

#aiPrompt::placeholder {
  color: var(--text-hint);
}

.generate-btn {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, var(--accent), var(--accent-bright));
  border: none;
  border-radius: var(--radius);
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--font-sans);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  box-shadow: 0 2px 12px rgba(94, 106, 210, 0.3);
  transition: all var(--duration) var(--ease);
  letter-spacing: -0.01em;
}

.generate-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(94, 106, 210, 0.45);
  background: linear-gradient(135deg, var(--accent-bright), #8b93e8);
}

.generate-btn:active {
  transform: translateY(0);
  box-shadow: 0 2px 8px rgba(94, 106, 210, 0.2);
}

.generate-btn.loading {
  opacity: 0.7;
  pointer-events: none;
  animation: pulse 1.5s ease infinite;
}

.generate-btn:focus-visible {
  outline: none;
  box-shadow: 0 0 0 3px var(--accent-glow), 0 2px 12px rgba(94, 106, 210, 0.25);
}


/* ─── 19. AI HISTORY ───────────────────────────────────────── */

.history-empty {
  text-align: center;
  padding: 30px 0;
  color: var(--text-hint);
  font-size: 13px;
}

.history-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px;
  margin-bottom: 6px;
  cursor: pointer;
}

.history-item:hover {
  border-color: var(--border-light);
  background: var(--bg-hover);
}

.hi-meta {
  display: flex;
  justify-content: space-between;
  margin-bottom: 5px;
}

.hi-mode {
  font-size: 10px;
  color: var(--accent);
  font-weight: 510;
}

.hi-time {
  font-size: 10px;
  color: var(--text-hint);
}

.hi-preview {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.5;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}


/* ─── 20. AI MULTI-SLOTS ───────────────────────────────────── */

.multi-slot {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  margin-bottom: 10px;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.multi-slot.slot-active {
  border-color: var(--accent-dim, rgba(var(--accent-rgb, 99, 102, 241), 0.3));
}

.multi-slot.slot-best {
  border-color: #22c55e;
  box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.15);
}

.slot-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.slot-label {
  font-size: 11px;
  font-weight: 510;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 6px;
}

.slot-num {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--accent-glow);
  color: var(--accent);
  font-size: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 510;
}

.slot-toggle {
  width: 28px;
  height: 16px;
  border-radius: 8px;
  background: var(--border);
  cursor: pointer;
  position: relative;
  border: none;
}

.slot-toggle.on {
  background: var(--accent);
}

.slot-toggle::after {
  content: '';
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #fff;
  position: absolute;
  top: 2px;
  left: 2px;
  transition: left 0.2s var(--ease);
}

.slot-toggle.on::after {
  left: 14px;
}

.slot-fields {
  display: none;
}

.slot-fields.show {
  display: block;
}

.slot-select {
  width: 100%;
  background: var(--bg-hover);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 6px 10px;
  color: var(--text-secondary);
  font-size: 12px;
  font-family: var(--font-sans);
  outline: none;
  margin-bottom: 4px;
}

.slot-input {
  width: 100%;
  background: var(--bg-hover);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 6px 10px;
  color: var(--text-primary);
  font-size: 11px;
  font-family: var(--font-sans);
  outline: none;
  margin-bottom: 4px;
}

.slot-input::placeholder {
  color: var(--text-hint);
}

.slot-result {
  margin-top: 10px;
  font-size: 13px;
  color: var(--text-muted);
  font-style: italic;
  line-height: 1.6;
  display: none;
  min-height: 80px;
  max-height: 300px;
  overflow-y: auto;
  padding: 10px;
  background: var(--bg-hover);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font-serif), Georgia, 'Noto Serif SC', serif;
  white-space: pre-wrap;
  word-break: break-word;
}

.slot-result.has-content {
  display: block;
  color: var(--text-secondary);
  font-style: normal;
  min-height: 150px;
}

.slot-result::-webkit-scrollbar {
  width: 4px;
}
.slot-result::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 2px;
}

.slot-meta {
  display: flex;
  gap: 12px;
  padding: 6px 0;
  font-size: 11px;
  color: var(--text-hint);
  border-top: 1px solid var(--border);
  margin-top: 6px;
}

.slot-actions {
  display: flex;
  gap: 6px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
  margin-top: 4px;
}

.slot-action-btn {
  background: var(--bg-hover);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 5px 10px;
  font-size: 11px;
  color: var(--text-secondary);
  cursor: pointer;
  font-family: var(--font-sans);
  transition: all 0.15s;
  white-space: nowrap;
}

.slot-action-btn:hover {
  background: var(--accent-glow);
  border-color: var(--accent);
  color: var(--accent);
}

.slot-best-btn {
  color: #22c55e;
  border-color: rgba(34, 197, 94, 0.3);
}

.slot-best-btn:hover {
  background: rgba(34, 197, 94, 0.1);
  border-color: #22c55e;
}

.slot-loading {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 20px;
  color: var(--text-hint);
  font-style: normal;
  font-size: 12px;
}

.slot-info {
  display: flex;
  align-items: center;
  gap: 6px;
}

.slot-provider-badge {
  background: var(--accent-glow);
  color: var(--accent);
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 510;
}

.slot-model-name {
  font-size: 10px;
  color: var(--text-hint);
}

.multi-summary {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px 12px;
  margin-bottom: 10px;
  background: var(--bg-hover);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 11px;
  color: var(--text-secondary);
  font-family: var(--font-sans);
}

.multi-bottom-actions {
  margin-top: 12px;
}

.multi-gen-btn {
  width: 100%;
  margin-bottom: 8px;
}

.multi-extra-btns {
  display: flex;
  gap: 8px;
}

.multi-action-btn {
  flex: 1;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  font-size: 12px;
  color: var(--text-secondary);
  cursor: pointer;
  font-family: var(--font-sans);
  transition: all 0.15s;
}

.multi-action-btn:hover {
  background: var(--accent-glow);
  border-color: var(--accent);
  color: var(--accent);
}


/* ─── 21. AI RESULT POPUP ──────────────────────────────────── */

.ai-result-popup {
  display: none;
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  width: min(600px, 90vw);
  background: var(--bg-panel);
  border: 1px solid var(--border-light);
  border-radius: 12px;
  box-shadow: var(--shadow-lg);
  z-index: 200;
  overflow: hidden;
}

.ai-result-popup.show {
  display: block;
  animation: popUp 0.25s var(--ease);
}

.arp-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-card);
}

.arp-title {
  font-size: 13px;
  font-weight: 510;
  display: flex;
  align-items: center;
  gap: 8px;
}

.arp-tag {
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 10px;
  background: var(--accent-glow);
  color: var(--accent);
  font-weight: 510;
}

.arp-close {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
  padding: 0;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
}

.arp-close:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.arp-body {
  padding: 16px;
  max-height: 220px;
  overflow-y: auto;
}

.arp-body::-webkit-scrollbar {
  width: 3px;
}

.arp-body::-webkit-scrollbar-thumb {
  background: var(--border);
}

.arp-text {
  font-family: var(--font-serif);
  font-size: 15px;
  line-height: 1.85;
  color: var(--text-primary);
  white-space: pre-wrap;
}

.arp-actions {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  background: var(--bg-card);
}

.arp-btn {
  flex: 1;
  padding: 8px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg-hover);
  color: var(--text-secondary);
  font-family: var(--font-sans);
}

.arp-btn:hover {
  background: var(--bg-active);
  color: var(--text-primary);
  border-color: var(--border-light);
}

.arp-btn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.arp-btn.primary:hover {
  background: #7170ff;
  border-color: #7170ff;
}

.arp-btn.primary:active {
  transform: translateY(0);
}


/* ─── 22. AI QUICK RESULT ──────────────────────────────────── */

#aiQuickResult {
  display: none;
}

#aiQuickResult.show {
  display: block;
  animation: slideUp 0.2s var(--ease);
}

.ai-qr-title {
  font-size: 13px;
  font-weight: 510;
  margin-bottom: 8px;
}

.ai-qr-text {
  font-size: 13px;
  line-height: 1.7;
  color: var(--text-secondary);
  white-space: pre-wrap;
}

.ai-qr-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

.ai-qr-radar-wrap {
  display: flex;
  justify-content: center;
  margin: 8px 0;
}

.ai-qr-radar-wrap canvas {
  border-radius: 8px;
}

.ai-qr-sentences {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}

.ai-qr-sentences .sent-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 6px;
}

.ai-qr-sentences .sent-btn {
  display: inline-block;
  font-size: 11px;
  padding: 3px 8px;
  margin: 2px 4px 2px 0;
  background: var(--bg-mid);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: background 0.15s;
}

.ai-qr-sentences .sent-btn:hover {
  background: var(--accent-bg);
  color: var(--accent);
  border-color: var(--accent);
}

.pres-level-bar {
  display: flex;
  gap: 6px;
  margin-bottom: 8px;
}

.pres-level-bar button {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--bg-mid);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.15s;
}

.pres-level-bar button.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.ai-diff-view {
  font-size: 13px;
  line-height: 1.8;
  margin-top: 8px;
}

.ai-diff-view .diff-del {
  background: rgba(255,60,60,0.15);
  color: #e55;
  text-decoration: line-through;
  display: block;
  padding: 2px 4px;
  border-radius: 3px;
  margin-bottom: 4px;
}

.ai-diff-view .diff-ins {
  background: rgba(60,200,60,0.15);
  color: #2a2;
  display: block;
  padding: 2px 4px;
  border-radius: 3px;
  margin-bottom: 4px;
}

.ai-diff-view .diff-header {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-hint);
  margin: 8px 0 4px;
}


/* ─── 23. FOCUS MODE ───────────────────────────────────────── */

.focus-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.85);
  z-index: 50;
  align-items: center;
  justify-content: center;
}

.focus-overlay.on {
  display: flex;
  animation: fadeIn 0.3s var(--ease);
}

.focus-editor-wrap {
  width: min(720px, 90vw);
  height: 80vh;
  display: flex;
  flex-direction: column;
  animation: modalIn 0.3s var(--ease);
}

.focus-editor {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  resize: none;
  font-family: var(--font-serif);
  font-size: 18px;
  line-height: 2;
  color: #e8eaf2;
  caret-color: var(--accent);
  font-feature-settings: 'cv01', 'ss03';
}

.focus-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-top: 1px solid rgba(255, 255, 255, 0.06);
}

.focus-info {
  font-size: 12px;
  color: rgba(255, 255, 255, 0.25);
}

.focus-exit {
  background: transparent;
  border: 1px solid rgba(255, 255, 255, 0.15);
  color: rgba(255, 255, 255, 0.4);
  padding: 5px 14px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 12px;
  font-family: var(--font-sans);
}

.focus-exit:hover {
  background: rgba(255, 255, 255, 0.05);
  color: rgba(255, 255, 255, 0.7);
}


/* ─── 24. MODALS ───────────────────────────────────────────── */

.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.65);
  z-index: 500;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(8px) saturate(120%);
  -webkit-backdrop-filter: blur(8px) saturate(120%);
}

.modal-overlay.show {
  display: flex;
  animation: fadeIn 0.2s var(--ease);
}

.modal {
  background: var(--bg-panel);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-lg);
  padding: 28px 28px 24px;
  width: min(480px, 92vw);
  box-shadow: var(--shadow-lg), var(--shadow-glow);
  animation: modalIn 0.25s var(--ease-bounce);
  max-height: 85vh;
  overflow-y: auto;
}

.modal-card {
  /* Alias for .modal — used in some markup */
  background: var(--bg-panel);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-lg);
  padding: 28px 28px 24px;
  width: min(480px, 92vw);
  box-shadow: var(--shadow-lg), var(--shadow-glow);
  animation: modalIn 0.25s var(--ease-bounce);
  max-height: 85vh;
  overflow-y: auto;
}

.modal-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}

.modal-title {
  font-family: var(--font-serif);
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  line-height: 1.35;
  letter-spacing: -0.02em;
  color: var(--text-primary);
}

.modal-sub {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 22px;
  line-height: 1.6;
}

.modal-close {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 18px;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
  flex-shrink: 0;
}

.modal-close:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.modal-body {
  /* Content area — inherits from parent */
}

.modal-footer {
  display: flex;
  gap: 10px;
  margin-top: 20px;
  flex-wrap: wrap;
}


/* ─── 25. FORMS ────────────────────────────────────────────── */

.form-row {
  margin-bottom: 14px;
}

.form-label {
  font-size: 12px;
  font-weight: 510;
  color: var(--text-secondary);
  margin-bottom: 6px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  flex-wrap: wrap;
  line-height: 1.4;
}

.form-hint {
  font-size: 11px;
  color: var(--text-hint);
  font-weight: 400;
}

.form-input,
.form-select,
.form-textarea {
  width: 100%;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 13px;
  color: var(--text-primary);
  font-size: 13px;
  font-family: var(--font-sans);
  outline: none;
  transition: border-color var(--duration) var(--ease), box-shadow var(--duration) var(--ease);
}

.form-input:focus,
.form-select:focus,
.form-textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
  background: var(--bg-card);
}

.form-textarea {
  resize: vertical;
  min-height: 80px;
  line-height: 1.6;
}

.form-select option {
  background: var(--bg-card);
}

.test-row {
  display: flex;
  gap: 8px;
}

.test-row .form-input {
  flex: 1;
}

.btn-test {
  padding: 10px 16px;
  border-radius: var(--radius-sm);
  background: var(--green-dim);
  border: 1px solid rgba(74, 222, 128, 0.2);
  color: var(--green);
  font-size: 12px;
  font-weight: 510;
  cursor: pointer;
  font-family: var(--font-sans);
  white-space: nowrap;
}

.btn-test:hover {
  background: rgba(74, 222, 128, 0.2);
}

.test-result {
  font-size: 11px;
  margin-top: 6px;
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  display: none;
}

.test-result.ok {
  background: var(--green-dim);
  color: var(--green);
  display: block;
}

.test-result.fail {
  background: rgba(248, 113, 113, 0.1);
  color: var(--red);
  display: block;
}


/* ─── 26. GENRE & PROVIDER CHIPS ───────────────────────────── */

.genre-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(72px, 1fr));
  gap: 6px;
  margin-top: 6px;
}

.genre-chip {
  padding: 6px 4px;
  border-radius: var(--radius-sm);
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 12px;
  cursor: pointer;
  text-align: center;
  font-family: var(--font-sans);
  line-height: 1.3;
  overflow-wrap: anywhere;
}

.genre-chip:hover {
  border-color: var(--border-light);
  color: var(--text-secondary);
  background: var(--bg-hover);
}

.genre-chip.on {
  background: var(--accent-glow);
  border-color: var(--accent-dim);
  color: var(--accent);
}

.provider-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(112px, 1fr));
  gap: 6px;
  margin-top: 6px;
}

.provider-chip {
  padding: 8px 6px;
  border-radius: var(--radius-sm);
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 11px;
  cursor: pointer;
  text-align: center;
  font-family: var(--font-sans);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  line-height: 1.25;
  overflow-wrap: anywhere;
  min-width: 0;
}

.provider-chip:hover {
  border-color: var(--border-light);
  color: var(--text-secondary);
  background: var(--bg-hover);
}

.provider-chip.on {
  background: var(--accent-glow);
  border-color: var(--accent-dim);
  color: var(--accent);
}


/* ─── 27. PROJECT LIST ─────────────────────────────────────── */

.project-list-item {
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  cursor: pointer;
  background: var(--bg-card);
}

.project-list-item:hover {
  border-color: var(--accent-dim);
  background: var(--bg-hover);
}

.project-list-item .pli-name {
  font-weight: 510;
  color: var(--text-primary);
  margin-bottom: 3px;
}

.project-list-item .pli-meta {
  font-size: 11px;
  color: var(--text-muted);
}


/* ─── 28. LANGUAGE SELECTION ────────────────────────────────── */

.lang-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}

.lang-option:hover {
  background: var(--accent-glow);
  color: var(--accent) !important;
}

.lang-card {
  padding: 12px;
  border-radius: var(--radius-sm);
  background: var(--bg-card);
  border: 1px solid var(--border);
  cursor: pointer;
  text-align: center;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 8px;
  justify-content: center;
  min-width: 0;
  line-height: 1.3;
}

.lang-card:hover {
  border-color: var(--accent-dim);
  background: var(--bg-hover);
}

.lang-card.active {
  border-color: var(--accent);
  background: var(--accent-glow);
  color: var(--accent);
}


/* ─── 29. THEME CARDS ──────────────────────────────────────── */

.theme-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.theme-card {
  padding: 20px;
  border-radius: var(--radius);
  cursor: pointer;
  text-align: center;
  border: 2px solid var(--border);
}

.theme-card.dark-preview {
  background: #08090a;
  color: #f7f8f8;
}

.theme-card.light-preview {
  background: #f8f9fa;
  color: #1a1a2e;
}

.theme-card:hover {
  border-color: var(--accent-dim);
}

.theme-card.active {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-glow);
}


/* ─── 30. TOAST ────────────────────────────────────────────── */

.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(60px) scale(0.95);
  background: var(--bg-elevated);
  border: 1px solid var(--border-light);
  border-radius: 30px;
  padding: 10px 22px;
  font-size: 13px;
  color: var(--text-primary);
  box-shadow: var(--shadow-md), var(--shadow-glow);
  z-index: 9999;
  pointer-events: none;
  display: flex;
  align-items: center;
  gap: 8px;
  opacity: 0;
  transition: transform 0.3s var(--ease-bounce), opacity 0.3s var(--ease);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.toast.show {
  transform: translateX(-50%) translateY(0) scale(1);
  opacity: 1;
}


/* ─── 31. CONTEXT BAR ──────────────────────────────────────── */

.context-bar {
  padding: 8px 16px;
  background: var(--bg-mid);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-muted);
  flex-wrap: wrap;
}


/* ─── 32. PREVIEW PANE ─────────────────────────────────────── */

#previewPane {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  background: var(--bg-deep);
  font-family: var(--font-serif);
  font-size: 16px;
  line-height: 1.9;
  color: var(--text-primary);
}


/* ─── 33. SETTINGS ──────────────────────────────────────────── */

.settings-panel {
  padding: 16px 0;
}

.settings-tabs {
  display: flex;
  gap: 2px;
  margin-bottom: 20px;
  background: var(--bg-deep);
  border-radius: var(--radius-sm);
  padding: 3px;
  flex-wrap: wrap;
}

.settings-tab {
  flex: 1 1 120px;
  min-width: 0;
  padding: 8px;
  text-align: center;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  background: transparent;
  border: none;
  font-family: var(--font-sans);
  white-space: normal;
  line-height: 1.3;
}

.settings-tab.active {
  background: var(--accent);
  color: #fff;
}

.settings-tab:hover:not(.active) {
  background: var(--bg-hover);
  color: var(--text-secondary);
}


/* ─── 34. PROFILE STATS ────────────────────────────────────── */

.profile-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.profile-stat-item {
  flex: 1 1 100px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  text-align: center;
}


/* ─── 35. MEMORY ITEMS ─────────────────────────────────────── */

.memory-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px;
  margin-bottom: 6px;
}

.memory-item:hover {
  border-color: var(--border-light);
  background: var(--bg-hover);
}

.mem-cat-chip {
  display: inline-block;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 10px;
  background: var(--accent-glow);
  color: var(--accent);
}


/* ─── 36. AI MEMORY ITEMS ──────────────────────────────────── */

.ai-mem-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px;
  margin-bottom: 6px;
}

.ai-mem-item:hover {
  border-color: var(--border-light);
}

.ai-mem-actions {
  display: flex;
  gap: 4px;
  margin-top: 6px;
}


/* ─── 37. MOBILE BOTTOM NAV ────────────────────────────────── */

.bottom-nav {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--bg-mid);
  border-top: 1px solid var(--border);
  z-index: 50;
  height: 52px;
}

.bottom-nav-items {
  display: flex;
  height: 100%;
}

.btab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: var(--text-muted);
  cursor: pointer;
  border: none;
  background: none;
  padding: 4px 0;
  font-family: var(--font-sans);
  gap: 2px;
  min-height: 44px;
}

.btab.on {
  color: var(--accent);
}

.btab span {
  font-size: 18px;
}

/* ─── 38. MOBILE PANELS ────────────────────────────────────── */

.mobile-panel {
  display: none;
  position: fixed;
  top: var(--topbar-h);
  bottom: 52px;
  left: 0;
  right: 0;
  background: var(--bg-mid);
  z-index: 25;
  overflow-y: auto;
  padding: 12px;
}

.mobile-panel.on {
  display: block;
  animation: slideUp 0.2s var(--ease);
}


/* ─── 39. MULTI-SLOTS CONTAINER ────────────────────────────── */

.multi-slots {
  /* Container for .multi-slot items */
}

.ms-slot {
  /* Alias for .multi-slot — used in some markup */
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  margin-bottom: 10px;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.ms-result {
  /* Alias for .slot-result — used in some markup */
  margin-top: 10px;
  font-size: 13px;
  color: var(--text-muted);
  font-style: italic;
  line-height: 1.6;
  display: none;
  min-height: 80px;
  max-height: 300px;
  overflow-y: auto;
  padding: 10px;
  background: var(--bg-hover);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font-serif), Georgia, 'Noto Serif SC', serif;
  white-space: pre-wrap;
  word-break: break-word;
}

.ms-result.has-content {
  display: block;
  color: var(--text-secondary);
  font-style: normal;
  min-height: 150px;
}


/* ─── 40. RESPONSIVE: TABLET ────────────────────────────────── */

@media (max-width: 768px) {
  .sidebar {
    display: none;
  }

  .ai-panel {
    width: 280px;
  }

  :root {
    --ai-panel-w: 280px;
  }
}


/* ─── 41. RESPONSIVE: MOBILE ───────────────────────────────── */

@media (max-width: 560px) {
  .sidebar {
    display: none;
  }

  .ai-panel {
    display: none;
  }

  .topbar-stats {
    display: none;
  }

  .topbar-logo {
    font-size: 15px;
  }

  .topbar-sep {
    display: none;
  }

  .topbar-actions {
    gap: 2px;
  }

  .topbar-actions .icon-btn {
    width: 28px;
    height: 28px;
    font-size: 13px;
  }

  .project-selector {
    max-width: 120px;
    font-size: 11px;
    padding: 5px 6px;
  }

  .bottom-nav {
    display: block;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }

  .bottom-nav .btab {
    padding-bottom: env(safe-area-inset-bottom, 0);
  }

  .main-body {
    position: absolute;
    top: var(--topbar-h);
    bottom: calc(52px + env(safe-area-inset-bottom, 0));
    left: 0;
    right: 0;
    overflow: hidden;
  }

  .editor-area {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 1;
  }

  .mobile-panel {
    z-index: 5;
  }

  .chapter-title-bar {
    padding: 12px 16px 0;
  }

  .chapter-title-input {
    font-size: 20px;
  }

  .chapter-meta {
    padding: 6px 16px;
    font-size: 11px;
  }

  .editor-wrap {
    padding: 8px 16px 30px;
  }

  .editor-toolbar {
    padding: 6px 8px;
    gap: 4px;
    overflow-x: auto;
    flex-wrap: nowrap;
    -webkit-overflow-scrolling: touch;
  }

  .tool-btn {
    padding: 6px 8px;
    font-size: 11px;
    min-height: 36px;
    min-width: 36px;
  }

  .toolbar-group {
    gap: 2px;
  }

  #aiQuickBar {
    padding: 6px 12px;
    gap: 4px;
    overflow-x: auto;
    flex-wrap: nowrap;
    -webkit-overflow-scrolling: touch;
  }

  #aiQuickBar .tool-btn {
    padding: 5px 6px;
    font-size: 10px;
    min-height: 30px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  #mainEditor {
    font-size: 15px;
    line-height: 1.8;
  }

  #mainEditor::placeholder,
  .chapter-title-input::placeholder {
    color: var(--text-muted);
  }

  .bottom-bar {
    padding: 6px 12px;
  }

  .bottom-bar .wc-item {
    font-size: 10px;
  }

  .goal-track {
    width: 60px;
  }

  /* Mobile modal adjustments */
  .modal {
    width: min(480px, 94vw);
    padding: 24px 20px 20px;
  }

  .modal-title {
    font-size: 16px;
  }

  /* Mobile result popup */
  .ai-result-popup {
    bottom: 60px;
    width: 94vw;
    border-radius: 10px;
  }

  .arp-body {
    max-height: 180px;
  }

  /* Toast */
  .toast {
    left: 16px;
    right: 16px;
    transform: translateX(0) translateY(60px);
    border-radius: var(--radius);
  }

  .toast.show {
    transform: translateX(0) translateY(0);
  }

  /* Genre grid on mobile */
  .genre-grid {
    grid-template-columns: repeat(auto-fit, minmax(64px, 1fr));
  }

  .provider-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}


/* ─── 42. PREFERS REDUCED MOTION ───────────────────────────── */

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }

  .toast.show {
    transition: none;
  }
}


/* ─── 43. PRINT / SAFARI TOUCH ─────────────────────────────── */

/* Prevent iOS rubber-band scrolling */
@media (max-width: 768px) {
  body {
    -webkit-overflow-scrolling: touch;
  }
}

/* Ensure tap highlights on mobile */
.btab,
.icon-btn,
.tool-btn,
.mode-btn,
.genre-chip,
.provider-chip,
.char-card,
.history-item,
.nav-tab,
.lang-card,
.theme-card {
  -webkit-tap-highlight-color: transparent;
}


/* ─── 44. LIGHT MODE — ENHANCED DEPTH & HIERARCHY ──────────── */
/*
   All rules below are scoped to body.light and provide the
   premium, polished light-theme feel (Notion / Linear style).
   Dark mode remains completely unaffected.
*/

/* ── 44a. Surface Depth: sidebar, topbar, panels ─────────── */

body.light .sidebar {
  background: var(--bg-mid);
  border-right-color: var(--border);
  box-shadow: 1px 0 0 var(--border-light);
}

body.light .topbar {
  background: var(--bg-mid);
  border-bottom-color: var(--border);
  box-shadow: 0 1px 0 var(--border-light);
}

body.light .editor-toolbar {
  background: var(--bg-mid);
  border-bottom-color: var(--border);
  box-shadow: inset 0 -1px 0 var(--border-light);
}

body.light .ai-panel {
  background: var(--bg-mid);

<div class="test-info">

<script>
// Log all clicks
document.addEventListener('click', function(e) {
  var el = e.target;
  var info = 'CLICK on: ' + el.tagName + '.' + el.className;
  var oc = el.getAttribute && el.getAttribute('onclick');
  if (!oc) {
    // Check parent
    var p = el.closest && el.closest('[onclick]');
    if (p) { oc = p.getAttribute('onclick'); info += ' (parent has onclick)'; }
  }
  info += ' onclick=' + (oc || 'NONE');
  document.querySelector('.test-info').innerHTML += '<p style="color:#ff0">' + info + '</p>';
  console.log(info);
}, true);
</script>
